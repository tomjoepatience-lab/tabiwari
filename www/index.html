<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>マネコ家計簿</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1a1a1a;
    color: #f5f5f0;
    font-family: -apple-system, "Hiragino Sans", sans-serif;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 8px; }
  p { font-size: 0.85rem; opacity: 0.8; line-height: 1.6; margin: 4px 0; }
</style>
</head>
<body>
  <!--
    このファイルは Capacitor の webDir プレースホルダです。
    本アプリは server.url（capacitor.config.ts）でリモートの
    マネコ家計簿（Render上のWebアプリ）を直接読み込むため、
    通常はこの画面が表示されることはありません。
    表示された場合はネットワーク接続または server.url の設定を確認してください。
  -->
  <div class="wrap">
    <h1>マネコ家計簿を読み込んでいます…</h1>
    <p>この画面が消えない場合は、インターネット接続を確認するか、</p>
    <p>時間をおいて再度アプリを開いてください。</p>
  </div>
</body>
</html>
