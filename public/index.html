<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- ズームアウト許可（ユーザー要望）: user-scalable=no / maximum-scale=1 を撤回し minimum-scale=0.5 に -->
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, viewport-fit=cover" />
  <title>マネコ家計簿</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#E8B62B" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="マネコ" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="/style.css?v=26" />
</head>
<body>
  <header class="appbar">
    <a href="#/" class="brand">マネコ家計簿</a>
    <span class="tagline">マネコといっしょに、お金じょうずに</span>
  </header>

  <main id="app">読み込み中…</main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="/main.js?v=26"></script>
  <script>
    // PWA: Service Worker 登録（HTTPS or localhost でのみ有効）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { /* 未対応環境は無視 */ });
      });
    }
  </script>
</body>
</html>
